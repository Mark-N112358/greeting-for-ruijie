<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>问候蕊姐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #ffeef5 0%, #fff0f6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 400px;
    }
    
    .greeting-card {
      background: linear-gradient(145deg, #ffffff, #ffeef5);
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.15);
      text-align: center;
    }
    
    .avatar {
      width: 80px;
      height: 80px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulse 2s infinite;
    }
    
    .avatar-icon {
      font-size: 40px;
    }
    
    .title {
      font-size: 28px;
      font-weight: bold;
      color: #ff6b9d;
      margin-bottom: 8px;
    }
    
    .subtitle {
      font-size: 14px;
      color: #ff8fab;
      margin-bottom: 20px;
    }
    
    .message {
      background: rgba(255, 107, 157, 0.08);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .message-text {
      font-size: 15px;
      color: #e91e63;
      line-height: 1.6;
    }
    
    .btn-area {
      margin-bottom: 20px;
    }
    
    .greet-btn {
      background: linear-gradient(135deg, #ff6b9d, #ff8fab);
      color: #ffffff;
      border: none;
      border-radius: 25px;
      padding: 12px 40px;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(255, 107, 157, 0.3);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .greet-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(255, 107, 157, 0.3);
    }
    
    .flowers {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    
    .flower {
      font-size: 20px;
      animation: float 3s ease-in-out infinite;
    }
    
    .flower:nth-child(1) { animation-delay: 0s; }
    .flower:nth-child(2) { animation-delay: 0.3s; }
    .flower:nth-child(3) { animation-delay: 0.6s; }
    .flower:nth-child(4) { animation-delay: 0.9s; }
    .flower:nth-child(5) { animation-delay: 1.2s; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      padding: 15px 25px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="greeting-card">
      <div class="avatar">
        <span class="avatar-icon"></span>
      </div>
      <div class="title">蕊姐好！</div>
      <div class="subtitle">祝您工作顺利，天天开心！</div>
      <div class="message">
        <span class="message-text" id="greetingMessage"></span>
      </div>
      <div class="btn-area">
        <button class="greet-btn" onclick="sendGreeting()">发送问候</button>
      </div>
      <div class="flowers">
        <span class="flower"></span>
        <span class="flower"></span>
        <span class="flower"></span>
        <span class="flower"></span>
        <span class="flower"></span>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const greetings = [
      '新的一天，元气满满！加油！',
      '愿今天的你，心情如阳光般灿烂！',
      '工作再忙也要记得休息哦！',
      '感谢蕊姐的带领，我们一起努力！',
      '愿你每一天都充满惊喜和美好！'
    ];
    
    function setGreeting() {
      const randomIndex = Math.floor(Math.random() * greetings.length);
      document.getElementById('greetingMessage').textContent = greetings[randomIndex];
    }
    
    function sendGreeting() {
      const toast = document.getElementById('toast');
      toast.textContent = '问候已发送！';
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
      
      setGreeting();
    }
    
    document.addEventListener('DOMContentLoaded', setGreeting);
  </script>
</body>
</html>
